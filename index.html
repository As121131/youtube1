<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sublex - Pro Subtitles</title>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script id="tailwind-config">

                        "surface-bright": "#39393b",
                        "error-container": "#93000a",

                        "surface-variant": "#353437",
                        "surface-container-low": "#1c1b1e",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed": "#7df4ff",
                        "on-primary-fixed-variant": "#74009f",

                        "on-tertiary-fixed-variant": "#095300",

    <style>
        .neon-grid {
            background-image: 
                linear-gradient(to right, rgba(236, 178, 255, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(236, 178, 255, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            position: relative;
        }
        .neon-grid::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(236, 178, 255, 0.02), transparent 85%);
            pointer-events: none;
            z-index: -1;
        }
        .glow-primary {
            box-shadow: 0 0 40px rgba(236, 178, 255, 0.3);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #ecb2ff;
            cursor: pointer;
            border-radius: 0px;
        }
        .view-section {
            display: none;
        }
        .view-section.active {
            display: block;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body neon-grid min-h-screen">

<!-- TopAppBar -->
<header class="sticky top-0 z-50 bg-surface-container-low/80 backdrop-blur-xl border-b border-outline-variant/20 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <span class="font-headline text-xl font-black tracking-tighter cursor-pointer" onclick="showView('presets')">Sublex</span>
        <div class="hidden md:flex items-center px-2 py-0.5 bg-primary/10 border border-primary/30">
            <span class="text-[7px] font-black text-primary uppercase tracking-[0.2em]">Live_Sync</span>
        </div>
    </div>
    <div class="flex items-center gap-4">
        <button id="lang-toggle" class="flex items-center gap-1 text-on-surface-variant hover:text-primary transition-colors">
            <span class="text-[10px] font-black tracking-widest uppercase" id="current-lang">EN</span>
            <span class="material-symbols-outlined text-sm">translate</span>
        </button>
        <div class="flex items-center gap-2 group cursor-pointer border-l border-outline-variant/20 pl-4">
            <div class="flex flex-col items-end leading-none">
                <span class="text-[9px] font-black text-tertiary uppercase tracking-widest">Premium</span>
            </div>
            <div class="w-8 h-8 flex items-center justify-center bg-tertiary/10 text-tertiary group-hover:bg-tertiary group-hover:text-on-tertiary transition-all">
                <span class="material-symbols-outlined text-sm">workspace_premium</span>
            </div>
        </div>
    </div>
</header>

<!-- Presets View -->
<main id="view-presets" class="view-section active max-w-7xl mx-auto p-6 lg:p-12 space-y-12 pb-24">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 border-l-4 border-primary pl-6">
        <div>
            <h1 class="font-headline text-6xl md:text-8xl font-black tracking-tighter leading-none" data-i18n="presets_title">PRESETS</h1>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-px bg-outline-variant/20 border border-outline-variant/20" id="presets-grid">
        <!-- Dynamic Presets 2x2 -->
    </div>
</main>

<!-- Editor View -->
<main id="view-editor" class="view-section max-w-7xl mx-auto p-6 lg:p-12 space-y-12 pb-24 min-h-screen bg-surface/60 backdrop-blur-2xl">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 border-l-4 border-primary pl-6">
        <div>
            <p class="font-label text-primary text-sm tracking-[0.3em] mb-2" data-i18n="active_preset">ACTIVE_PRESET</p>
            <h1 class="font-headline text-6xl md:text-8xl font-black tracking-tighter leading-none uppercase" id="editor-preset-name">CYBERPUNK_01</h1>
        </div>
        <div class="flex gap-4 mb-2">
            <button class="px-6 py-2 bg-primary text-on-primary font-bold text-sm tracking-widest hover:glow-primary transition-all" onclick="saveChanges()" data-i18n="save_changes">SAVE_CHANGES</button>
            <button class="px-6 py-2 border border-outline-variant text-on-surface font-bold text-sm tracking-widest hover:bg-surface-container-highest transition-all" onclick="showView('presets')" data-i18n="back">BACK</button>
        </div>
    </div>

    <!-- Live Preview Section -->
    <section class="space-y-4 pt-12">
        <div id="preview-frame" class="relative aspect-video w-full bg-surface-container-lowest transition-all duration-500 shadow-2xl mx-auto max-w-[500px]">
            <!-- Aspect Ratio Selector (Top Right) -->
            <div class="absolute top-3 right-3 flex gap-0 z-50 bg-black/80 backdrop-blur-xl border border-white/10 rounded-sm overflow-visible shadow-xl">
                <button onclick="setAspectRatio('9:16')" class="ratio-btn px-2.5 py-1.5 text-[9px] font-black tracking-tighter hover:bg-white/5 transition-all text-on-surface-variant border-r border-white/5" data-ratio="9:16">9:16</button>
                <button onclick="setAspectRatio('1:1')" class="ratio-btn px-2.5 py-1.5 text-[9px] font-black tracking-tighter hover:bg-white/5 transition-all text-on-surface-variant border-r border-white/5" data-ratio="1:1">1:1</button>
                <button onclick="setAspectRatio('16:9')" class="ratio-btn px-2.5 py-1.5 text-[9px] font-black tracking-tighter hover:bg-white/5 transition-all text-primary border-r border-white/5" data-ratio="16:9">16:9</button>
                
                <div class="relative">
                    <button id="ratio-more-btn" onclick="toggleRatioDropdown(event)" class="px-2.5 py-1.5 text-[9px] font-black hover:bg-white/5 transition-all text-on-surface-variant flex items-center justify-center">
                        <span class="material-symbols-outlined text-xs pointer-events-none">more_horiz</span>
                    </button>
                    <!-- Small Dropdown -->
                    <div id="ratio-dropdown" class="absolute top-full right-0 mt-1 bg-surface-container-high border border-outline-variant/30 hidden flex-col w-24 shadow-2xl z-[60]">
                        <button onclick="setAspectRatio('4:5')" class="ratio-btn px-3 py-2 text-[9px] font-black text-left hover:bg-primary/10 transition-colors border-b border-outline-variant/10 text-on-surface-variant" data-ratio="4:5">4:5 (IG)</button>
                        <button onclick="setAspectRatio('4:3')" class="ratio-btn px-3 py-2 text-[9px] font-black text-left hover:bg-primary/10 transition-colors border-b border-outline-variant/10 text-on-surface-variant" data-ratio="4:3">4:3 (Classic)</button>
                        <button onclick="setAspectRatio('2:3')" class="ratio-btn px-3 py-2 text-[9px] font-black text-left hover:bg-primary/10 transition-colors border-b border-outline-variant/10 text-on-surface-variant" data-ratio="2:3">2:3</button>
                        <button onclick="setAspectRatio('21:9')" class="ratio-btn px-3 py-2 text-[9px] font-black text-left hover:bg-primary/10 transition-colors text-on-surface-variant" data-ratio="21:9">21:9 (UW)</button>
                    </div>
                </div>
            </div>

            <div id="editor-preview-container" class="relative w-full h-full bg-surface-container-highest/30 overflow-hidden">
                  <div id="preview-text-wrapper" class="absolute pointer-events-none flex items-center justify-center text-center" style="left: 50%; top: 70%; transform: translate(-50%, -50%); transition: none;">
                    <p id="preview-text" class="text-2xl font-black uppercase tracking-tighter text-center whitespace-normal break-words max-w-[90vw] drop-shadow-lg" style="transition: none;">SAMPLE_TEXT</p>
                  </div>
                 <div class="absolute inset-0 scanline opacity-10 pointer-events-none"></div>
                 <div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-black/20 pointer-events-none"></div>
            </div>
        </div>
    </section>

    <!-- Settings Controls (Placeholder for dynamic range sliders etc) -->
    <div id="editor-controls" class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Dynamic controls based on preset -->
    </div>
</main>

<!-- Gallery View -->
<main id="view-gallery" class="view-section max-w-7xl mx-auto p-6 lg:p-12 space-y-12 pb-24">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 border-l-4 border-primary pl-6">
        <div>
            <p class="font-label text-primary text-sm tracking-[0.3em] mb-2 uppercase">Archives</p>
            <h1 class="font-headline text-6xl md:text-8xl font-black tracking-tighter leading-none" data-i18n="gallery_title">GALLERY</h1>
        </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Gallery items -->
        <div class="bg-surface-container h-64 flex items-center justify-center border border-outline-variant/20 italic text-on-surface-variant">No media found</div>
    </div>
</main>

<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 z-50 bg-surface-container-lowest border-t border-outline-variant/20 h-20 px-6 flex items-center justify-around shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
    <button class="nav-btn relative flex flex-col items-center gap-1 group w-1/4 h-full justify-center" onclick="showView('presets', this)">
        <div class="active-indicator absolute top-0 left-1/2 -translate-x-1/2 w-10 h-0.5 bg-primary opacity-100 transition-all"></div>
        <span class="nav-icon material-symbols-outlined text-primary text-2xl group-hover:scale-110 transition-transform">grid_view</span>
        <span class="nav-label text-[10px] font-black uppercase tracking-widest text-primary">Presets</span>
    </button>

    <button class="nav-btn relative flex flex-col items-center gap-1 group w-1/4 h-full justify-center" onclick="showView('editor', this)">
        <div class="active-indicator absolute top-0 left-1/2 -translate-x-1/2 w-10 h-0.5 bg-primary opacity-0 transition-all"></div>
        <span class="nav-icon material-symbols-outlined text-on-surface-variant text-2xl group-hover:scale-110 transition-transform group-hover:text-primary">tune</span>
        <span class="nav-label text-[10px] font-black uppercase tracking-widest text-on-surface-variant group-hover:text-primary">Editor</span>
    </button>

    <button class="nav-btn relative flex flex-col items-center gap-1 group w-1/4 h-full justify-center" onclick="showView('gallery', this)">
        <div class="active-indicator absolute top-0 left-1/2 -translate-x-1/2 w-10 h-0.5 bg-primary opacity-0 transition-all"></div>
        <span class="nav-icon material-symbols-outlined text-on-surface-variant text-2xl group-hover:scale-110 transition-transform group-hover:text-primary">video_library</span>
        <span class="nav-label text-[10px] font-black uppercase tracking-widest text-on-surface-variant group-hover:text-primary">Gallery</span>
    </button>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.setHeaderColor('#131315');
    // Hide standard blue button - we use our own design
    tg.MainButton.hide();
    tg.MainButton.setText("-"); // Reset standard text

    const PRESETS = [
        { id: '1', name: 'PRESET_01', cat: 'ITALIC', color: '#ffffff', css: 'font-style:italic; font-weight:800;', desc: 'White italic text, clean style.' },
        { id: '2', name: 'PRESET_02', cat: 'BOLD', color: '#ffffff', css: 'font-weight:900; -webkit-text-stroke: 1px #000;', desc: 'Extra bold white text with outline.' },
        { id: '3', name: 'PRESET_03', cat: 'KARAOKE', color: '#ffffff', css: 'font-weight:800; text-shadow: 2px 2px #00FF9933;', desc: 'Karaoke with blue highlight.' },
        { id: '4', name: 'PRESET_04', cat: 'GLOW', color: '#FFD7FF', css: 'font-weight:800; text-shadow: 0 0 15px #FFD700;', desc: 'Yellow text with soft glow.' },
        { id: '5', name: 'PRESET_05', cat: 'TIKTOK', color: '#ffffff', css: 'background:#E43F7B; color:#fff; padding:8px; font-style:italic; font-weight:800;', desc: 'Pink compact box style.' },
        { id: '6', name: 'PRESET_06', cat: 'DISPLAY', color: '#ffffff', css: 'font-weight:700; font-family:sans-serif;', desc: 'SF Pro style bold white.' },
        { id: '7', name: 'PRESET_07', cat: 'FADE', color: '#ffffff', css: 'font-weight:600; text-shadow: 0 0 10px rgba(255,255,255,0.5);', desc: 'White text with fade effect.' },
        { id: '8', name: 'PRESET_08', cat: 'BOXED', color: '#ffffff', css: 'background:#000; color:#fff; padding:10px; border-radius:8px; font-weight:800;', desc: 'Black moving box karaoke.' },
        { id: '9', name: 'PRESET_09', cat: 'CYBER', color: '#ffffff', css: 'background:#50C8F0; color:#fff; padding:6px; font-weight:700; text-shadow: 0 0 5px #fff;', desc: 'Light blue cyber glow.' },
        { id: '10', name: 'PRESET_10', cat: 'NEON', color: '#39FF14', css: 'font-weight:900; text-shadow: 0 0 20px #39FF14;', desc: 'Toxic green neon glow.' },
        { id: '11', name: 'PRESET_11', cat: 'KARAOKE', color: '#ffffff', css: 'font-weight:800; text-shadow: 2px 2px #0000FF66;', desc: 'Green karaoke highlight.' },
        { id: '12', name: 'PRESET_12', cat: 'HISTORY', color: '#ffffff', css: 'border-bottom: 2px solid #fff; font-weight:800;', desc: 'Two lines history effect.' },
        { id: '13', name: 'PRESET_13', cat: 'GLASS', color: '#ffffff', css: 'font-weight:900; mix-blend-mode: difference;', desc: 'Glass inversion effect.' },
        { id: '14', name: 'PRESET_14', cat: 'PREMIUM', color: '#ffffff', css: 'font-weight:900; text-shadow: 0 0 10px rgba(255,255,255,0.3);', desc: 'Premium Montserrat style.' }
    ];

    const I18N = {
        EN: {
            presets_title: "PRESETS",
            active_preset: "ACTIVE_PRESET",
            save_changes: "SAVE_CHANGES",
            back: "BACK",
            gallery_title: "GALLERY",
            nav_presets: "Presets",
            nav_editor: "Editor",
            nav_gallery: "Gallery",
            pos_y: "Vertical Position",
            pos_x: "Horizontal Position",
            size: "Text Size",
            words: "Words Per Screen",
            punct: "Punctuation",
            color_text: "Text color",
            color_box: "Box color",
            text_shadow: "Drop Shadow",
            text_stroke: "Stroke",
            lines_count: "Lines Count",
            anim_type: "Animation",
            mask_int: "Mask Intensity",
            caps: "Case settings",
            auto: "AUTO",
            on: "ON",
            off: "OFF",
            weak: "WEAK",
            medium: "MEDIUM",
            strong: "STRONG",
            default: "DEFAULT",
            static: "STATIC",
            fade: "FADE",
            btn_commas: "COMMAS",
            btn_caps: "CAPITALIZED"
        },
        RU: {
            presets_title: "ПРЕСЕТЫ",
            active_preset: "АКТИВНЫЙ_ПРЕСЕТ",
            save_changes: "СОХРАНИТЬ",
            back: "НАЗАД",
            gallery_title: "ГАЛЕРЕЯ",
            nav_presets: "Пресеты",
            nav_editor: "Редактор",
            nav_gallery: "Галерея",
            pos_y: "Вертикальная позиция",
            pos_x: "Горизонтальная позиция",
            size: "Размер текста",
            words: "Слов на экран",
            punct: "Знаки препинания",
            color_text: "Цвет текста",
            color_box: "Цвет плашки",
            text_shadow: "Тень",
            text_stroke: "Обводка",
            lines_count: "Количество строк",
            anim_type: "Анимация",
            mask_int: "Интенсивность",
            caps: "Регистр текста",
            auto: "АВТО",
            on: "ВКЛ",
            off: "ВЫКЛ",
            weak: "СЛАБАЯ",
            medium: "СРЕДНЯЯ",
            strong: "СИЛЬНАЯ",
            default: "ДВИЖЕНИЕ",
            static: "СТАТИКА",
            fade: "FADE",
            btn_commas: "ЗАПЯТЫЕ",
            btn_caps: "ЗАГЛАВНЫЕ"
        }
    };

    function updateLanguage() {
        const lang = currentLang;
        document.getElementById('current-lang').innerText = lang;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (I18N[lang][key]) el.innerText = I18N[lang][key];
        });
        // Update nav labels
        document.querySelectorAll('.nav-label').forEach((el, i) => {
            const keys = ['nav_presets', 'nav_editor', 'nav_gallery'];
            el.innerText = I18N[lang][keys[i]];
        });
    }

    let currentPreset = PRESETS[0];

    function renderPresets() {
        const grid = document.getElementById('presets-grid');
        grid.innerHTML = '';
        PRESETS.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = "group border border-outline-variant/20 bg-surface p-4 flex flex-col gap-4 cursor-pointer hover:border-primary transition-all aspect-square relative overflow-hidden";
            card.innerHTML = `
                <div class="flex justify-between items-start z-10">
                    <span class="font-label text-[10px] text-primary tracking-widest uppercase">${p.cat}</span>
                    <div class="flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-tertiary rounded-full animate-pulse"></span>
                        <span class="font-label text-[8px] text-on-surface-variant uppercase">Online</span>
                    </div>
                </div>
                <div class="flex-1 flex items-center justify-center relative bg-surface-container-low border border-outline-variant/10">
                    <p class="text-xl font-black uppercase text-center px-2" style="${p.css} color:${p.color}">${p.name}</p>
                    <div class="absolute inset-0 scanline opacity-10 pointer-events-none"></div>
                </div>
                <div class="z-10 border-t border-outline-variant/30 pt-4 mt-auto">
                    <p class="font-headline text-lg font-black tracking-tighter uppercase leading-none">${p.name}</p>
                </div>
                <div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            `;
            card.onclick = () => {
                currentPreset = p;
                openEditor(p);
            };
            grid.appendChild(card);
        });
    }

    function showView(viewId, btn = null) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById(`view-${viewId}`).classList.add('active');

        // Nav active state
        if (btn) {
            document.querySelectorAll('.nav-btn').forEach(b => {
                const icon = b.querySelector('.nav-icon');
                const label = b.querySelector('.nav-label');
                const indicator = b.querySelector('.active-indicator');
                icon.classList.replace('text-primary', 'text-on-surface-variant');
                label.classList.replace('text-primary', 'text-on-surface-variant');
                indicator.style.opacity = '0';
            });
            const icon = btn.querySelector('.nav-icon');
            const label = btn.querySelector('.nav-label');
            const indicator = btn.querySelector('.active-indicator');
            icon.classList.replace('text-on-surface-variant', 'text-primary');
            label.classList.replace('text-on-surface-variant', 'text-primary');
            indicator.style.opacity = '1';
        }
        
        tg.HapticFeedback.impactOccurred('light');
    }

    let activePresetId = '1';

    function openEditor(p) {
        activePresetId = String(p.id);
        document.getElementById('editor-preset-name').innerText = p.name;
        const preview = document.getElementById('preview-text');
        if (preview) {
            preview.innerText = "SAMPLE_TEXT";
            preview.className = "text-center";
            // Important: use cssText for string styles, then specific props
            let css = p.css;
            if (p.id === '8') {
                // Remove the full-box background from the wrapper for 8th preset preview
                css = css.replace(/background:[^;]+;?/, '').replace(/padding:[^;]+;?/, '');
            }
            preview.style.cssText = css;
            preview.style.color = p.color;
        }

        const controls = document.getElementById('editor-controls');
        const lang = currentLang;
        
        // Initial values from URL or defaults
        const urlParams = new URLSearchParams(window.location.search);
        const initX = urlParams.get('x') || '50';
        const initY = urlParams.get('y') || '70';
        const initWords = urlParams.get('w') || '1';
        const initLines = urlParams.get('l') || '1';
        const initPunct = urlParams.get('punc') === 'true';
        const initCaps = urlParams.get('caps') === 'true';
        const initCapsFirst = urlParams.get('cf') === 'true';
        const initSize = urlParams.get('s') || '1'; // 0, 1, 2, 3
        const initStroke = urlParams.get('st') !== null && urlParams.get('st') !== '' ? urlParams.get('st') : '2';
        const initShadow = urlParams.get('sh') !== null && urlParams.get('sh') !== '' ? urlParams.get('sh') : '3';

        // General Settings HTML
        let html = `
            <div class="space-y-6 bg-surface-container-low p-6 border border-outline-variant/20 col-span-1 md:col-span-2">
                <p class="text-[10px] font-black tracking-[0.3em] text-primary uppercase mb-4">GENERAL_STATION</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Vertical Pos -->
                    <div class="space-y-3">
                        <div class="flex justify-between">
                            <span class="text-[10px] font-black tracking-widest text-on-surface-variant uppercase" data-i18n="pos_y">${I18N[lang].pos_y}</span>
                            <span class="text-[10px] font-black text-primary" id="val-pos-y">${initY}%</span>
                        </div>
                        <input type="range" id="input-pos-y" min="0" max="100" value="${initY}" class="w-full h-1 bg-surface-container-highest appearance-none cursor-pointer accent-primary" 
                            oninput="document.getElementById('val-pos-y').innerText=this.value+'%'; updateLivePreview()">
                    </div>
                    <!-- Horizontal Pos -->
                    <div class="space-y-3">
                        <div class="flex justify-between">
                            <span class="text-[10px] font-black tracking-widest text-on-surface-variant uppercase" data-i18n="pos_x">${I18N[lang].pos_x}</span>
                            <span class="text-[10px] font-black text-primary" id="val-pos-x">${initX}%</span>
                        </div>
                        <input type="range" id="input-pos-x" min="0" max="100" value="${initX}" class="w-full h-1 bg-surface-container-highest appearance-none cursor-pointer accent-primary" 
                            oninput="document.getElementById('val-pos-x').innerText=this.value+'%'; updateLivePreview()">
                    </div>
                    <!-- Text Size -->
                    <div class="space-y-3">
                        <div class="flex justify-between">
                            <span class="text-[10px] font-black tracking-widest text-on-surface-variant uppercase" data-i18n="size">${I18N[lang].size}</span>
                            <span class="text-[10px] font-black text-primary" id="val-size">MEDIUM</span>
                        </div>
                        <input type="range" id="input-size" min="0" max="3" value="${initSize}" class="w-full h-1 bg-surface-container-highest appearance-none cursor-pointer accent-primary" 
                            oninput="const v=['SMALL','MEDIUM','LARGE','MAX']; document.getElementById('val-size').innerText=v[this.value]; updatePreviewText()">
                    </div>
                    <!-- Words count -->
                    <div class="space-y-3">
                        <div class="flex justify-between">
                            <span class="text-[10px] font-black tracking-widest text-on-surface-variant uppercase" data-i18n="words">${I18N[lang].words}</span>
                            <span class="text-[10px] font-black text-primary uppercase" id="val-words">${initWords == 0 ? I18N[lang].auto : initWords}</span>
                        </div>
                        <input type="range" id="input-words" min="0" max="5" value="${initWords}" class="w-full h-1 bg-surface-container-highest appearance-none cursor-pointer accent-primary" 
                            oninput="document.getElementById('val-words').innerText=this.value == 0 ? I18N[currentLang].auto : this.value; updatePreviewText()">
                    </div>
                    <!-- Lines count -->
                    <div class="space-y-3">
                        <div class="flex justify-between">
                            <span class="text-[10px] font-black tracking-widest text-on-surface-variant uppercase" data-i18n="lines_count">${I18N[lang].lines_count}</span>
                            <span class="text-[10px] font-black text-primary uppercase" id="val-lines">${initLines == 0 ? I18N[lang].auto : initLines}</span>
                        </div>
                        <input type="range" id="input-lines" min="0" max="3" value="${initLines}" class="w-full h-1 bg-surface-container-highest appearance-none cursor-pointer accent-primary" 
                            oninput="document.getElementById('val-lines').innerText=this.value == 0 ? I18N[currentLang].auto : this.value; updatePreviewText()">
                    </div>
                </div>
                <div class="pt-4 border-t border-outline-variant/10 flex items-center justify-between">
                    <span class="text-xs font-bold" data-i18n="punct">${I18N[lang].punct}</span>
                    <div class="flex gap-2">
                        <button id="btn-punct" class="px-3 py-1 border border-primary text-[10px] font-black text-primary hover:bg-primary/10 transition-all uppercase" data-state="${initPunct ? 'on' : 'off'}" data-i18n="btn_commas" onclick="toggleButton(this); updatePreviewText()">${I18N[lang].btn_commas}</button>
                        <button id="btn-caps-first" class="px-3 py-1 border border-primary text-[10px] font-black text-primary hover:bg-primary/10 transition-all uppercase" data-state="${initCapsFirst ? 'on' : 'off'}" data-i18n="btn_caps" onclick="toggleButton(this); updatePreviewText()">${I18N[lang].btn_caps}</button>
                    </div>
                </div>

                <div class="pt-4 border-t border-outline-variant/10 flex items-center justify-between">
                    <span class="text-xs font-bold" data-i18n="caps">${I18N[lang].caps}</span>
                    <button id="btn-all-caps" class="px-4 py-1 border border-primary text-[10px] font-black text-primary hover:bg-primary/10 transition-all uppercase" data-state="${initCaps ? 'on' : 'off'}" onclick="toggleButton(this); updatePreviewText()">OFF</button>
                </div>

                <div class="pt-4 border-t border-outline-variant/10 flex items-center justify-between">
                    <span class="text-xs font-bold" data-i18n="color_text">${I18N[lang].color_text}</span>
                    <input type="color" id="input-text-color" value="${p.color}" class="w-8 h-8 border-none bg-transparent cursor-pointer" oninput="document.getElementById('preview-text').style.color=this.value; updatePreviewText()">
                </div>
            </div>
        `;

        // Preset-specific settings
        if (p.id === '8') {
             html += `
                <div class="space-y-6 bg-surface-container-low p-6 border border-outline-variant/20">
                    <p class="text-[10px] font-black tracking-[0.3em] text-primary uppercase mb-4">PRESET_CORE</p>
                    <div class="flex flex-col gap-4">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold" data-i18n="color_box">${I18N[lang].color_box}</span>
                            <input type="color" id="input-box-color" value="#000000" class="w-8 h-8 border-none bg-transparent cursor-pointer" oninput="updatePreviewText()">
                        </div>
                        <div class="space-y-3">
                            <div class="flex justify-between">
                                <span class="text-[10px] font-black tracking-widest text-on-surface-variant uppercase" data-i18n="text_stroke">${I18N[lang].text_stroke}</span>
                                <span class="text-[10px] font-black text-primary uppercase" id="val-stroke">${initStroke}</span>
                            </div>
                            <input type="range" id="input-stroke" min="0" max="10" value="${initStroke}" class="w-full h-1 bg-surface-container-highest appearance-none cursor-pointer accent-primary" 
                                oninput="document.getElementById('val-stroke').innerText=this.value; updatePreviewText()">
                        </div>
                        <div class="space-y-3">
                            <div class="flex justify-between">
                                <span class="text-[10px] font-black tracking-widest text-on-surface-variant uppercase" data-i18n="text_shadow">${I18N[lang].text_shadow}</span>
                                <span class="text-[10px] font-black text-primary uppercase" id="val-shadow">${initShadow}</span>
                            </div>
                            <input type="range" id="input-shadow" min="0" max="15" value="${initShadow}" class="w-full h-1 bg-surface-container-highest appearance-none cursor-pointer accent-primary" 
                                oninput="document.getElementById('val-shadow').innerText=this.value; updatePreviewText()">
                        </div>
                        <div class="space-y-3">
                            <div class="flex justify-between">
                                <span class="text-[10px] font-black tracking-widest text-on-surface-variant uppercase" data-i18n="anim_type">${I18N[lang].anim_type}</span>
                                <span class="text-[10px] font-black text-primary uppercase" id="val-anim">DEFAULT</span>
                            </div>
                            <input type="range" id="input-anim" min="0" max="2" value="0" class="w-full h-1 bg-surface-container-highest appearance-none cursor-pointer accent-primary" 
                                oninput="const v=['DEFAULT','STATIC','FADE']; document.getElementById('val-anim').innerText=v[this.value]">
                        </div>
                    </div>
                </div>
             `;
        }

        if (p.id === '13') {
             html += `
                <div class="space-y-6 bg-surface-container-low p-6 border border-outline-variant/20">
                    <p class="text-[10px] font-black tracking-[0.3em] text-primary uppercase mb-4">BLEND_MATRIX</p>
                    <div class="space-y-4">
                        <div class="space-y-3">
                            <div class="flex justify-between">
                                <span class="text-[10px] font-black tracking-widest text-on-surface-variant uppercase" data-i18n="mask_int">${I18N[lang].mask_int}</span>
                                <span class="text-[10px] font-black text-primary uppercase" id="val-mask">MEDIUM</span>
                            </div>
                            <input type="range" id="input-mask" min="0" max="2" value="1" class="w-full h-1 bg-surface-container-highest appearance-none cursor-pointer accent-primary" 
                                oninput="const v=['WEAK','MEDIUM','STRONG']; document.getElementById('val-mask').innerText=v[this.value]">
                        </div>
                    </div>
                </div>
             `;
        }

        controls.innerHTML = html;
        showView('editor');
        setTimeout(updateLivePreview, 100); // Initial position
    }

    function setAspectRatio(ratio) {
        const frame = document.getElementById('preview-frame');
        const dropdown = document.getElementById('ratio-dropdown');
        
        // Remove old aspect classes
        const classes = Array.from(frame.classList).filter(c => c.startsWith('aspect-'));
        classes.forEach(c => frame.classList.remove(c));
        
        if (ratio === '16:9') frame.classList.add('aspect-video');
        else if (ratio === '1:1') frame.classList.add('aspect-square');
        else if (ratio === '9:16') frame.classList.add('aspect-[9/16]');
        else {
            // Support arbitrary ratios from Tailwind
            const [w, h] = ratio.split(':');
            frame.classList.add(`aspect-[${w}/${h}]`);
        }

        // Update active button state
        document.querySelectorAll('.ratio-btn').forEach(btn => {
            if (btn.dataset.ratio === ratio) {
                btn.classList.add('text-primary');
                btn.classList.remove('text-on-surface-variant');
            } else {
                btn.classList.remove('text-primary');
                btn.classList.add('text-on-surface-variant');
            }
        });

        // Hide dropdown
        if (dropdown) dropdown.classList.add('hidden');
        
        tg.HapticFeedback.impactOccurred('light');
    }

    function toggleRatioDropdown(e) {
        e.stopPropagation();
        const dropdown = document.getElementById('ratio-dropdown');
        dropdown?.classList.toggle('hidden');
        tg.HapticFeedback.impactOccurred('light');
    }

    // Global click to close dropdown
    document.addEventListener('click', () => {
        const dropdown = document.getElementById('ratio-dropdown');
        if (dropdown) dropdown.classList.add('hidden');
    });

    function updatePreviewText() {
        const previewEl = document.getElementById('preview-text');
        if (!previewEl) return;
        
        const wordsCount = parseInt(document.getElementById('input-words')?.value || 1);
        const linesCount = parseInt(document.getElementById('input-lines')?.value || 1);
        const isAllCaps = document.getElementById('btn-all-caps')?.dataset.state === 'on';
        const isCapsFirst = document.getElementById('btn-caps-first')?.dataset.state === 'on';
        const isPunct = document.getElementById('btn-punct')?.dataset.state === 'on';
        const sizeVal = parseInt(document.getElementById('input-size')?.value || 1);
        const textShadow = parseInt(document.getElementById('input-shadow')?.value || 0);
        const textStroke = parseInt(document.getElementById('input-stroke')?.value || 0);
        
        // Apply text scaling based on size slider (0=small, 1=medium, 2=large, 3=max)
        const scaleMap = { 0: 0.75, 1: 1.0, 2: 1.25, 3: 1.6 };
        const scale = scaleMap[sizeVal] || 1.0;
        previewEl.style.transform = `scale(${scale})`;
        previewEl.style.transformOrigin = 'center center';
        
        let allWords = ["sample", "text", "here", "is", "great"];
        
        // 1. Process transformations
        let processedWords = [...allWords];
        
        if (isAllCaps) {
            processedWords = processedWords.map(w => w.toUpperCase());
        } else if (isCapsFirst) {
            processedWords[0] = processedWords[0].charAt(0).toUpperCase() + processedWords[0].slice(1);
        }
        
        // Для предпросмотра, если выбран режим AUTO (0), показываем 2 слова построчно
        const previewWordsCount = wordsCount === 0 ? 2 : wordsCount;
        const previewLinesCount = linesCount === 0 ? 1 : linesCount;
        
        let selectedWords = processedWords.slice(0, previewWordsCount);
        if (isPunct && selectedWords.length > 1) {
            selectedWords[0] = selectedWords[0] + ",";
        }
        
        const isPreset8 = activePresetId === '8';
        const textColor = document.getElementById('input-text-color')?.value || '#ffffff';
        const boxColor = document.getElementById('input-box-color')?.value || '#000000';
        
        let shadowStyle = '';
        let shadows = [];
        
        if (textStroke > 0) {
            // Реалистичная имитация обводки
            const sO = textStroke * 0.7;
            shadows.push(`${sO}px ${sO}px 0 #000`);
            shadows.push(`-${sO}px -${sO}px 0 #000`);
            shadows.push(`${sO}px -${sO}px 0 #000`);
            shadows.push(`-${sO}px ${sO}px 0 #000`);
            
            // Заглушка для углов (для более круглой обводки)
            shadows.push(`0px ${sO}px 0 #000`);
            shadows.push(`0px -${sO}px 0 #000`);
            shadows.push(`${sO}px 0px 0 #000`);
            shadows.push(`-${sO}px 0px 0 #000`);
        }
        
        if (textShadow > 0) {
            // Добавляем объемную мягкую тень падения с увеличенным радиусом и размытием
            const shBlur = textShadow * 4;
            const shY = textShadow * 1.5;
            shadows.push(`0px ${shY}px ${shBlur}px rgba(0,0,0,1)`);
            shadows.push(`0px ${shY/2}px ${shBlur/2}px rgba(0,0,0,0.8)`);
        }
        
        if (shadows.length > 0) {
            shadowStyle = `text-shadow: ${shadows.join(', ')};`;
        }
        
        const boxStyle = `background:${boxColor}; color:${textColor}; padding:2px 15px; border-radius:10px; margin-right:4px; display:inline-block; line-height:1; vertical-align:baseline; ${shadowStyle}`;
        const emptyBoxStyle = `background:transparent; color:${textColor}; padding:2px 15px; margin-right:4px; display:inline-block; line-height:1; vertical-align:baseline; ${shadowStyle}`;
        
        if (previewLinesCount === 1 || previewWordsCount === 1) {
            if (isPreset8) {
                const first = selectedWords[0];
                const rest = selectedWords.slice(1).join(' ');
                previewEl.innerHTML = `<span style="${boxStyle}">${first}</span>${rest ? ' ' + rest : ''}`;
            } else {
                previewEl.innerHTML = selectedWords.join(' ');
            }
        } else if (previewLinesCount === 2) {
            const mid = Math.ceil(previewWordsCount / 2);
            const line1Words = selectedWords.slice(0, mid);
            const line2Words = selectedWords.slice(mid);
            
            if (isPreset8) {
                const first = line1Words[0];
                const rest1 = line1Words.slice(1).join(' ');
                const l1 = `<span style="${boxStyle}">${first}</span>${rest1 ? ' ' + rest1 : ''}`;
                const l2 = line2Words.join(' ');
                previewEl.innerHTML = `${l1}<br>${l2}`;
            } else {
                previewEl.innerHTML = `${line1Words.join(' ')}<br>${line2Words.join(' ')}`;
            }
        } else if (previewLinesCount === 3) {
            if (previewWordsCount <= 2) {
                if (isPreset8) {
                    const first = selectedWords[0];
                    const rest = selectedWords.slice(1);
                    const l1 = `<span style="${boxStyle}">${first}</span>`;
                    previewEl.innerHTML = [l1, ...rest].join('<br>');
                } else {
                    previewEl.innerHTML = selectedWords.join('<br>');
                }
            } else {
                const perLine = Math.ceil(previewWordsCount / 3);
                const line1Words = selectedWords.slice(0, perLine);
                const line2Words = selectedWords.slice(perLine, perLine * 2);
                const line3Words = selectedWords.slice(perLine * 2);
                
                if (isPreset8) {
                    const first = line1Words[0];
                    const rest1 = line1Words.slice(1).join(' ');
                    const l1 = `<span style="${boxStyle}">${first}</span>${rest1 ? ' ' + rest1 : ''}`;
                    previewEl.innerHTML = `${l1}<br>${line2Words.join(' ')}<br>${line3Words.join(' ')}`;
                } else {
                    previewEl.innerHTML = `${line1Words.join(' ')}<br>${line2Words.join(' ')}<br>${line3Words.join(' ')}`;
                }
            }
        }
    }

    function toggleButton(btn) {
        const newState = btn.dataset.state === 'on' ? 'off' : 'on';
        btn.dataset.state = newState;
        
        // Update label for ON/OFF buttons
        if (btn.id === 'btn-all-caps' || btn.innerText === 'ON' || btn.innerText === 'OFF') {
            btn.innerText = newState.toUpperCase();
        }

        if (newState === 'on') {
            btn.classList.add('border-tertiary', 'text-tertiary');
            btn.classList.remove('border-primary', 'text-primary');
        } else {
            btn.classList.remove('border-tertiary', 'text-tertiary');
            btn.classList.add('border-primary', 'text-primary');
        }
        tg.HapticFeedback.impactOccurred('light')
    }

    function updateLivePreview() {
        const xEl = document.getElementById('input-pos-x');
        const yEl = document.getElementById('input-pos-y');
        const x = xEl ? xEl.value : 50;
        const y = yEl ? yEl.value : 70;
        
        const wrapper = document.getElementById('preview-text-wrapper');
        if (wrapper) {
            wrapper.style.left = `${x}%`;
            wrapper.style.top = `${y}%`;
            wrapper.style.transform = `translate(-50%, -50%)`;
        }
        updatePreviewText();
    }

    function saveChanges(event) {
        const btn = event instanceof Event ? event.currentTarget : document.querySelector('[onclick="saveChanges()"]');
        if (btn) {
            btn.innerText = currentLang === 'RU' ? "СОХРАНЕНИЕ..." : "SAVING...";
            btn.classList.add('animate-pulse');
            btn.disabled = true;
        }
        
        tg.HapticFeedback.notificationOccurred('success');
        
        const settings = {
            preset: String(activePresetId), 
            action: 'save',
            params: {
                position_y: Number(document.getElementById('input-pos-y')?.value || 50),
                position_x: Number(document.getElementById('input-pos-x')?.value || 50),
                size: String(document.getElementById('val-size')?.innerText || 'MEDIUM').toLowerCase(),
                words_per_screen: Number(document.getElementById('input-words')?.value || 0),
                max_lines: Number(document.getElementById('input-lines')?.value || 1),
                punctuation: document.getElementById('btn-punct')?.dataset.state === 'on',
                uppercase: document.getElementById('btn-all-caps')?.dataset.state === 'on',
                capitalize_first: document.getElementById('btn-caps-first')?.dataset.state === 'on',
                text_color: String(document.getElementById('input-text-color')?.value || '#ffffff'),
                box_color: document.getElementById('input-box-color') ? String(document.getElementById('input-box-color').value) : null,
                animation_type: document.getElementById('val-anim') ? String(document.getElementById('val-anim').innerText.toLowerCase()) : 'default',
                text_shadow: document.getElementById('input-shadow') ? Number(document.getElementById('input-shadow').value) : null,
                text_stroke: document.getElementById('input-stroke') ? Number(document.getElementById('input-stroke').value) : null,
                mask_intensity: document.getElementById('val-mask') ? String(document.getElementById('val-mask').innerText.toLowerCase()) : 'medium'
            }
        };

        console.log("Saving settings:", settings);
        tg.sendData(JSON.stringify(settings));
        
        // Закрываем через небольшую паузу для плавности
        setTimeout(() => {
            tg.close();
        }, 150);
    }

    let currentLang = 'EN';
    document.getElementById('lang-toggle').onclick = () => {
        currentLang = currentLang === 'EN' ? 'RU' : 'EN';
        updateLanguage();
        tg.HapticFeedback.impactOccurred('light');
    };

    updateLanguage();
    renderPresets();

    // Auto-open preset if specified in URL
    const urlParams = new URLSearchParams(window.location.search);
    const presetParam = urlParams.get('preset');
    if (presetParam) {
        const p = PRESETS.find(pr => pr.id === presetParam);
        if (p) {
            openEditor(p);
        } else {
            showView('presets');
        }
    } else {
        showView('presets');
    }
</script>
